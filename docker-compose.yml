services:
  jellybridge:
    build: .
    container_name: jellybridge
    ports:
      - "4321:4321"
    volumes:
      # App persistent data (settings.json)
      - /DATA/AppData/jellybridge:/app/data
      # External drive — same path inside container as on host
      # so destination paths you type in the UI match exactly
      - /mnt:/mnt
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
